<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Management</title>
    <style>
        :root {
            /* Primary colors */
            --am-d-primary: #F15E74;
            --am-d-secondary: #2C3E50;
            --am-d-accent: #2563eb;
            --am-d-bg: #FAFAFA;
            --am-d-text: #000000;

            /* Status colors */
            --am-d-success: #16a34a;
            --am-d-warning: #f59e0b;
            --am-d-error: #ea0124;

            /* UI colors */
            --am-d-white: #ffffff;
            --am-d-card-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            --am-d-border-light: #e9eef3;
            --am-d-border-default: #e2e8f0;
            --am-d-grey-light-text: #5a6e7c;

            /* Light BGS */
            --am-d-light-yellow-bg: #fff2dc;
            --am-d-light-red-bg: #ffe6ea;
            --am-d-light-green-bg: #d5ffe5;

        }

        /* Toaster Styles */
        .toaster {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--am-d-white);
            border: 1px solid var(--am-d-border-default);
            border-left: 4px solid var(--am-d-primary);
            border-radius: 8px;
            box-shadow: var(--am-d-card-shadow);
            padding: 16px 40px 16px 16px;
            min-width: 300px;
            max-width: 400px;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        .toaster.hiding {
            animation: slideOut 0.3s ease-out forwards;
        }

        .toaster-title {
            font-weight: 600;
            color: var(--am-d-text);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .toaster-message {
            color: var(--am-d-grey-light-text);
            font-size: 13px;
            line-height: 1.4;
        }

        .toaster-close {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: var(--am-d-grey-light-text);
            font-size: 18px;
            line-height: 1;
            transition: color 0.2s;
        }

        .toaster-close:hover {
            color: var(--am-d-primary);
        }
    </style>
</head>
<body>
    <!-- Toaster Container -->
    <div id="toaster" class="toaster" style="display: none;">
        <div class="toaster-title" id="toasterTitle">Success</div>
        <div class="toaster-message" id="toasterMessage">Operation completed successfully!</div>
        <button class="toaster-close" onclick="closeToaster()" aria-label="Close">&times;</button>
    </div>

    <script>
        let toasterTimeout;

        function showToaster(title, message) {
            const toaster = document.getElementById('toaster');
            const toasterTitle = document.getElementById('toasterTitle');
            const toasterMessage = document.getElementById('toasterMessage');

            toasterTitle.textContent = title;
            toasterMessage.textContent = message;
            
            toaster.style.display = 'block';
            toaster.classList.remove('hiding');

            // Clear any existing timeout
            if (toasterTimeout) {
                clearTimeout(toasterTimeout);
            }

            // Auto hide after 5 seconds
            toasterTimeout = setTimeout(function() {
                closeToaster();
            }, 5000);
        }

        function closeToaster() {
            const toaster = document.getElementById('toaster');
            toaster.classList.add('hiding');
            
            setTimeout(function() {
                toaster.style.display = 'none';
                toaster.classList.remove('hiding');
            }, 300);
        }

        // Demo: Show toaster on page load
        window.onload = function() {
            setTimeout(function() {
                showToaster('Welcome', 'You have successfully logged in!');
            }, 500);
        };
    </script>
</body>
</html>
