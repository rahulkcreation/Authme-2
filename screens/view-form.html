<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Review</title>
    <style>
        /* ============================================
         * AuthMe — Global CSS Variables & Typography
         * ============================================ */

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            /* Primary palette */
            --authme-primary: #2563eb;
            --authme-primary-hover: #1d4ed8;
            --authme-primary-ring: rgba(37, 99, 235, 0.15);
            --authme-primary-shadow: rgba(37, 99, 235, 0.2);

            /* Status colors */
            --authme-success: #16a34a;
            --authme-success-bg: #f0fdf4;
            --authme-success-ring: rgba(22, 163, 74, 0.12);
            --authme-error: #dc2626;
            --authme-error-bg: #fef2f2;
            --authme-error-ring: rgba(220, 38, 38, 0.12);
            --authme-warning: #f59e0b;
            --authme-warning-bg: #fffbeb;
            --authme-info: #2563eb;
            --authme-info-bg: #eff6ff;

            /* Password strength specific */
            --authme-strength-good: #3b82f6;

            /* Text */
            --authme-text-main: #0f172a;
            --authme-text-muted: #64748b;
            --authme-text-placeholder: #94a3b8;

            /* Backgrounds & surfaces */
            --authme-bg: #f8fafc;
            --authme-card-bg: #ffffff;
            --authme-input-bg: #ffffff;
            --authme-white: #ffffff;

            /* Backdrop overlay */
            --authme-backdrop: rgba(15, 23, 42, 0.55);

            /* Borders */
            --authme-border: #e2e8f0;

            /* Border radius */
            --authme-radius-sm: 8px;
            --authme-radius-md: 10px;
            --authme-radius-lg: 20px;

            /* Shadows */
            --authme-shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --authme-shadow-md: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
            --authme-shadow-lg: 0 20px 60px -15px rgba(0, 0, 0, 0.12);
            --authme-toast-shadow: 0 8px 30px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(0, 0, 0, 0.04);

            /* Font */
            --authme-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* ── Base Styles ───────────────────────── */
        body {
            font-family: var(--authme-font);
            background-color: var(--authme-bg);
            color: var(--authme-text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        * {
            box-sizing: border-box;
        }

        /* ── Layout ────────────────────────────── */
        .main-container {
            width: 100%;
            max-width: 600px;
            padding: 24px;
        }

        /* ── Header ────────────────────────────── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            background: none;
            border: none;
            color: var(--authme-primary);
            cursor: pointer;
            padding: 8px;
            margin-left: -8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .btn-back:hover {
            background-color: var(--authme-info-bg);
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--authme-primary);
            margin: 0;
        }

        .app-id {
            color: var(--authme-text-muted);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* ── Profile Card ──────────────────────── */
        .profile-card {
            background-color: var(--authme-card-bg);
            border-radius: var(--authme-radius-lg);
            padding: 24px;
            border: 1px solid var(--authme-border);
            box-shadow: var(--authme-shadow-sm);
            margin-bottom: 32px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .avatar {
            width: 64px;
            height: 64px;
            background-color: var(--authme-info-bg);
            color: var(--authme-primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }

        .profile-name {
            margin: 0 0 4px 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--authme-text-main);
        }

        .profile-handle {
            margin: 0;
            color: var(--authme-text-muted);
            font-size: 14px;
        }

        .contact-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
        }

        .contact-row.dashed-border {
            border-bottom: 1px dashed var(--authme-border);
        }

        .contact-label {
            color: var(--authme-text-muted);
            font-size: 14px;
        }

        .contact-value {
            color: var(--authme-primary);
            font-weight: 500;
            font-size: 15px;
        }

        @media (min-width: 480px) {
            .contact-value {
                font-size: 16px;
            }
        }

        /* ── Sections ──────────────────────────── */
        .section-title {
            font-size: 17.6px; /* ~1.1rem */
            font-weight: 700;
            color: var(--authme-text-main);
            margin: 0 0 16px 0;
        }

        .section-mb {
            margin-bottom: 32px;
        }

        /* ── Documents List ────────────────────── */
        .doc-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .doc-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--authme-card-bg); /* Using card bg for surface */
            border-radius: var(--authme-radius-md);
            padding: 8px 16px 8px 8px;
            border: 1px solid var(--authme-border);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .doc-item:hover {
            transform: scale(1.01);
            box-shadow: var(--authme-shadow-sm);
        }

        .doc-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .doc-icon-wrapper {
            width: 48px;
            height: 48px;
            background-color: var(--authme-bg);
            border-radius: var(--authme-radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--authme-primary);
            box-shadow: var(--authme-shadow-sm);
        }

        .doc-name {
            font-weight: 500;
            color: var(--authme-text-main);
            font-size: 15px;
        }

        .btn-view {
            background: none;
            border: none;
            color: var(--authme-text-muted);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .btn-view:hover {
            color: var(--authme-primary);
        }

        /* ── Status Dropdown ───────────────────── */
        .status-btn {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--authme-card-bg);
            border: 1px solid var(--authme-border);
            padding: 16px;
            border-radius: var(--authme-radius-md);
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            transition: background-color 0.2s;
        }

        .status-btn:hover {
            background-color: var(--authme-bg);
        }

        .status-btn:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--authme-primary-ring);
            border-color: var(--authme-primary);
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: var(--authme-warning);
            border-radius: 50%;
        }

        .status-text {
            font-weight: 500;
            color: var(--authme-text-main);
        }

        .status-icon {
            color: var(--authme-text-muted);
        }

        /* ── Submit Button ─────────────────────── */
        .btn-submit {
            width: 100%;
            background-color: var(--authme-primary);
            color: var(--authme-white);
            border: none;
            padding: 16px;
            border-radius: var(--authme-radius-md);
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: var(--authme-shadow-sm);
            margin-bottom: 40px;
            font-family: inherit;
        }

        .btn-submit:hover {
            background-color: var(--authme-primary-hover);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

        <!-- Uploaded Documents Section -->
        <section class="section-mb">

                <!-- Document Item 1 -->
                <div class="doc-item" onclick="viewDocument('Aadhar Front.jpg')">

                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    <div class="doc-info">
                        <div class="doc-icon-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                        </div>
                        <span class="doc-name">Aadhar Back.jpg</span>

                    <button class="btn-view">

        </section>

        <!-- Application Status Section -->
        <section class="section-mb">
            <h3 class="section-title">Application Status</h3>
            <button class="status-btn" onclick="toggleStatusDropdown()">
                <div class="status-info">
                    <div class="status-dot"></div>
                    <span class="status-text">Pending</span>
                </div>
                <div class="status-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

        <!-- Submit Button -->
        <button class="btn-submit" onclick="submitReview()">
            <span>Create ID</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>

    </main>

    <!-- Raw JS for basic interactions -->
    <script>
        function handleBack() {
            console.log("Back button clicked");
            // Add navigation logic here
        }

        function viewDocument(docName) {
            console.log("Viewing document:", docName);
            // Add document view logic here
        }

        function toggleStatusDropdown() {
            console.log("Toggling status dropdown");
            // Add dropdown logic here
        }

        function submitReview() {
            const btn = document.querySelector('.btn-submit');
            const originalText = btn.innerHTML;
            
            // Basic loading animation feedback
            btn.innerHTML = '<span>Submitting...</span>';
            btn.style.opacity = '0.8';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = '<span>Review Submitted</span>';
                btn.style.backgroundColor = 'var(--authme-success)';
                btn.style.opacity = '1';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.backgroundColor = 'var(--authme-primary)';
                    btn.disabled = false;
                }, 2000);
            }, 1000);
        }
    </script>
</body>
</html>
